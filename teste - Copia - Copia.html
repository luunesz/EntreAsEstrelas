<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Div com Rolagem</title>
<style>
  .scroll-box {
    width: 300px;              /* largura fixa */
    height: 150px;             /* altura fixa */
    border: 1px solid #ccc;    /* borda para visualização */
    padding: 10px;
    overflow-y: auto;          /* rolagem vertical automática */
    overflow-x: hidden;        /* sem rolagem horizontal */
    background-color: #f9f9f9;
  }
</style>
</head>
<body>

<div class="scroll-box">
  <p>Conteúdo 1</p>
  <p>Conteúdo 2</p>
  <p>Conteúdo 3</p>
  <p>Conteúdo 4</p>
  <p>Conteúdo 5</p>
  <p>Conteúdo 6</p>
  <p>Conteúdo 7</p>
  <p>Conteúdo 8</p>
</div>



</body>
</html>
