<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rolagem Horizontal</title>
<style>
  /* Contêiner com rolagem horizontal */
  .scroll-horizontal {
    display: flex;              /* Organiza os itens lado a lado */
    overflow-x: auto;           /* Ativa rolagem horizontal */
    overflow-y: hidden;         /* Remove rolagem vertical */
    white-space: nowrap;        /* Impede quebra de linha */
    gap: 10px;                  /* Espaço entre os itens */
    padding: 10px;
    border: 2px solid #ccc;
    scroll-behavior: smooth;    /* Rolagem suave */
  }

  /* Itens internos */
  .item {
    min-width: 200px;           /* Largura mínima para manter formato */
    height: 150px;
    background-color: #4CAF50;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border-radius: 8px;
    flex-shrink: 0;             /* Impede que o item diminua */
  }

  /* Estiliza a barra de rolagem (opcional) */
  .scroll-horizontal::-webkit-scrollbar {
    height: 8px;
  }
  .scroll-horizontal::-webkit-scrollbar-thumb {
    background: #888;
    border-radius: 4px;
  }
  .scroll-horizontal::-webkit-scrollbar-thumb:hover {
    background: #555;
  }
</style>
</head>
<body>

<h2>Exemplo de Rolagem Horizontal</h2>
<div class="scroll-horizontal">
  <div class="item">Item 1</div>
  <div class="item">Item 2</div>
  <div class="item">Item 3</div>
  <div class="item">Item 4</div>
  <div class="item">Item 5</div>
  <div class="item">Item 6</div>
  <div class="item">Item 6</div>
  <div class="item">Item 6</div>
  <div class="item">Item 6</div>
</div>

</body>
</html>
